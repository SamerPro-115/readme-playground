<svg xmlns="http://www.w3.org/2000/svg" width="340" height="200" viewBox="0 0 340 200"><style>
@keyframes gpsc-fade{from{opacity:0}to{opacity:1}}
@keyframes gpsc-rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes gpsc-grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes gpsc-pop{from{opacity:0;transform:scale(.55)}to{opacity:1;transform:scale(1)}}
@keyframes gpsc-wipe{from{transform:translateX(calc(-1 * var(--gpsc-w,420px)))}to{transform:translateX(0)}}
@keyframes gpsc-tint{from{filter:sepia(.7) saturate(4) hue-rotate(-70deg)}to{filter:sepia(0) saturate(1) hue-rotate(0)}}
@keyframes gpsc-rgb{0%{filter:hue-rotate(0deg) saturate(1)}50%{filter:hue-rotate(180deg) saturate(1.7)}100%{filter:hue-rotate(360deg) saturate(1)}}.gpsc-root{animation:gpsc-rgb 5s linear infinite}@media (prefers-reduced-motion:reduce){.gpsc-root,.gpsc-root *,.gpsc-item,.gpsc-chart,rect.bar,.arc,.gpsc-reveal{animation:none!important}}</style><style>* {
          font-family: 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif
        }</style><g class="gpsc-root"><rect x="1" y="1" rx="5" ry="5" height="99%" width="99.41176470588235%" stroke="#000000" stroke-width="1" fill="#0a0f0b" stroke-opacity="0"></rect><text x="30" y="40" class="gpsc-item" style="--gpsc-i: 0; font-size: 22px; fill: #abd200;">Top Languages by Commit</text><g transform="translate(0,40)"><g transform="translate(40,0)"><rect y="18" width="14" height="14" class="gpsc-item" style="--gpsc-i: 0; stroke-width: 1px;" fill="#e34c26" stroke="#0a0f0b"></rect><rect y="43.2" width="14" height="14" class="gpsc-item" style="--gpsc-i: 1; stroke-width: 1px;" fill="#3178c6" stroke="#0a0f0b"></rect><rect y="68.4" width="14" height="14" class="gpsc-item" style="--gpsc-i: 2; stroke-width: 1px;" fill="#f1e05a" stroke="#0a0f0b"></rect><text x="16.8" y="30" class="gpsc-item" style="--gpsc-i: 0; fill: #68b587; font-size: 14px;">HTML</text><text x="16.8" y="55.2" class="gpsc-item" style="--gpsc-i: 1; fill: #68b587; font-size: 14px;">TypeScript</text><text x="16.8" y="80.4" class="gpsc-item" style="--gpsc-i: 2; fill: #68b587; font-size: 14px;">JavaScript</text></g><g transform="translate( 230, 80 )"><g class="arc" style="--gpsc-i: 0;"><path d="M3.67394039744206e-15,-60A60,60,0,0,1,1.3511084335887715,59.98478562102798L0.7881465862601168,34.99112494559966A35,35,0,0,0,2.1431318985078682e-15,-35Z" style="fill: #e34c26; stroke-width: 2px;" stroke="#0a0f0b"></path></g><g class="arc" style="--gpsc-i: 1;"><path d="M1.3511084335887715,59.98478562102798A60,60,0,0,1,-29.118117751864844,-52.46079696867494L-16.985568688587826,-30.602131565060382A35,35,0,0,0,0.7881465862601168,34.99112494559966Z" style="fill: #3178c6; stroke-width: 2px;" stroke="#0a0f0b"></path></g><g class="arc" style="--gpsc-i: 2;"><path d="M-29.118117751864844,-52.46079696867494A60,60,0,0,1,4.226888398968133e-14,-60L2.4656848993980778e-14,-35A35,35,0,0,0,-16.985568688587826,-30.602131565060382Z" style="fill: #f1e05a; stroke-width: 2px;" stroke="#0a0f0b"></path></g></g></g></g></svg>